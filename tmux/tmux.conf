# -- GENERAL -------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",alacritty:RGB"
set -ga terminal-overrides ",*256col*:Tc"
set -s escape-time 0
set -sg repeat-time 600
set -s focus-events on
set -g history-limit 50000

# Prefix key: Ctrl+A (GNU Screen compatible)
set -g prefix C-a
bind C-a send-prefix
unbind C-b

bind r source-file ~/.config/tmux/tmux.conf \; display "✓ Config reloaded"

# -- DISPLAY -------------------------------------------------------------------

set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on
set -g set-titles on
set -g display-panes-time 800
set -g display-time 1000
set -g status-interval 30

# -- NAVIGATION ----------------------------------------------------------------

bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'
bind BTab switch-client -l

bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n M-o select-pane -t :.+

# Smart pane switching — passes C-hjkl to vim when focused
is_vim="ps -o state=,tty=,comm= | grep -iqE '^[^TXZ ]+ +#{s|/dev/||:pane_tty}\s+(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\\ select-pane -l

# Overmind-aware bindings
is_overmind="tmux display-message -p '#{pane_current_command}' | grep overmind"
bind C-l if-shell "$is_overmind" "send-prefix \; send-keys 'C-l'" "send-keys 'C-l'"
bind C-\\ send-prefix \; send-keys d

bind f run-shell "open '#{pane_current_path}'"
bind g run-shell "tmux-popup 'lazygit'"

bind > swap-pane -D
bind < swap-pane -U

bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

bind m run "tmux set -g mouse $([ $(tmux show -gv mouse) = 'on' ] && echo 'off' || echo 'on')" \; display "Mouse: #{?mouse,ON,OFF}"

# -- COPY MODE -----------------------------------------------------------------

bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

if-shell 'command -v pbcopy > /dev/null 2>&1' \
  'bind Y run -b "tmux save-buffer - | pbcopy"'

bind y display-popup -E -w 90% -h 85% "claude-tmux"

# -- DESIGN TWEAKS -------------------------------------------------------------

set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

setw -g clock-mode-colour yellow

setw -g mode-style 'fg=black bg=red bold'

set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow bold'
set -g window-style 'fg=colour253,bg=colour235'
set -g window-active-style 'fg=colour015,bg=colour233'

set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=red'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=black bg=yellow'
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=red'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

set -g message-style 'fg=yellow bg=red bold'

# -- MOUSE & VI ----------------------------------------------------------------

set -g mouse on
setw -g mode-keys vi
set -g status-keys vi

# -- WINDOW MANAGEMENT ---------------------------------------------------------

bind c new-window -c "#{pane_current_path}"
bind z resize-pane -Z
bind x kill-pane
bind X kill-window
bind b list-buffers
bind p paste-buffer
# prefix + S: move current pane/window to a new session
bind S display-popup -E -w 60% -h 50% "tmux-move-to-session"

# -- CUSTOM SHORTCUTS ----------------------------------------------------------

# prefix + G: switch gro-tools plugin suite (stable/canary)
bind G display-popup -E -w 50 -h 12 -T " gro-tools suite " "$HOME/.claude/scripts/gro-switch.sh"

# -- PLUGINS -------------------------------------------------------------------
# tmux-sensible removed — all its settings already configured explicitly above

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'
